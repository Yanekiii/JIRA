{% extends "blog/base.html" %}

{% block content %}

<div class="container mt-4">

<h3>Edit Member</h3>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>User</label>

<select name="user" class="form-control">
{% for user in users %}
<option value="{{ user.id }}" 
{% if user.id == membership.user.id %}selected{% endif %}>
{{ user.username }}
</option>
{% endfor %}
</select>
</div>

<div class="mb-3">
<label>Role</label>

<select name="role" class="form-control">
<option value="Admin" {% if membership.role == "Admin" %}selected{% endif %}>Admin</option>
<option value="Contributor" {% if membership.role == "Contributor" %}selected{% endif %}>Contributor</option>
<option value="Read-Only" {% if membership.role == "Read-Only" %}selected{% endif %}>Read-Only</option>
</select>

</div>

<button type="submit" class="btn btn-primary">
Save
</button>
</form>
</div>
{% endblock %}
