{% extends "base.html" %}
{% block content %}
  <div class="card border-0 shadow-sm rounded-4 mb-4">
    <div class="card-body p-4">
      
      <div class="d-flex justify-content-between align-items-start mb-4">
        
        <div class="d-flex align-items-center">
          <img class="rounded-circle shadow-sm me-3" src="{{ object.author.profile.image.url }}" alt="Avatar" style="width: 48px; height: 48px; object-fit: cover;">
          <div>
            <a class="text-decoration-none fw-bold text-dark" href="#">{{ object.author }}</a>
            <div class="text-muted small">Créé le {{ object.date_posted|date:"d/m/Y" }}</div>
          </div>
        </div>

        {% if object.author == user %}
          <div>
            <a class="btn btn-outline-primary btn-sm rounded-pill px-3" href="{% url 'ticket-update' object.id %}">Modifier</a>
            <a class="btn btn-outline-danger btn-sm rounded-pill px-3 ms-2" href="{% url 'ticket-delete' object.id %}">Supprimer</a>
          </div>
        {% endif %}
      </div>

      <h2 class="h4 fw-bold mb-3 d-flex align-items-center">
        {{ object.title }}
        <span class="badge bg-light text-primary border border-primary ms-3 rounded-pill" style="font-size: 0.55em; cursor: help;" data-bs-toggle="tooltip" title="En Scrum, ce ticket peut être une User Story (un besoin utilisateur) ou une Task (une tâche technique).">
          💡 Terme Scrum
        </span>
      </h2>

      <div class="text-secondary" style="line-height: 1.7;">
        {{ object.content }}
      </div>

    </div>
  </div>
{% endblock content %}
