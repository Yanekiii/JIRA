{% extends "blog/base.html" %}
{% block content %}
<div class="card border-0 shadow-sm rounded-3" style="max-width:500px;">
  <div class="card-body text-center p-4">
    <h4 class="fw-bold text-danger">Delete Epic</h4>
    <p class="text-muted">Are you sure you want to delete epic <strong>{{ object.title }}</strong>?</p>
    <form method="POST">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger rounded-pill px-4">Yes, Delete</button>
      <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-pill px-4 ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
