{% extends "blog/base.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 78px);">
  <div class="card border-0 shadow rounded-4" style="max-width:460px; width:100%;">
    <div class="card-body text-center p-5">
      <div class="mb-3 fs-1">🗑️</div>
      <h4 class="fw-bold text-danger mb-2">Delete Epic</h4>
      <p class="text-muted mb-4">Are you sure you want to delete epic <strong>{{ object.title }}</strong>? This action cannot be undone.</p>
      <form method="POST">
        {% csrf_token %}
        <div class="d-flex justify-content-center gap-3">
          <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
          <button type="submit" class="btn btn-danger rounded-pill px-4">Yes, Delete</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
