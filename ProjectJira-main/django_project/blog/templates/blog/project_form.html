{% extends "blog/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="content-section">
    <form method="POST">
        {% csrf_token %}

        <fieldset class="form-group">
            <legend class="border-bottom mb-4">Create / Edit Project</legend>
            {{ form|crispy }}
        </fieldset>

        <div class="form-group">
            <button class="btn btn-outline-info" type="submit">Save Project</button>
            <a class="btn btn-outline-secondary" href="{% url 'project-list' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock content %}
