{% extends "blog/base.html" %}
{% load crispy_forms_tags %}

{% block content %}

<div class="container-fluid d-flex justify-content-center align-items-center" style="min-height:80vh;">

<div class="card shadow border-0" style="width:500px;">
<div class="card-body p-4">

<form method="POST">

{% csrf_token %}

<fieldset class="form-group">
<legend class="border-bottom mb-4 text-center">Create Your Account</legend>

{{ form|crispy }}

</fieldset>

<div class="d-grid mt-3">
<button class="btn btn-primary" type="submit">
Sign Up
</button>
</div>

</form>

<div class="border-top mt-4 pt-3 text-center">
<small class="text-muted">
Already have an account?
<a href="{% url 'login' %}">Sign in</a>
</small>
</div>

</div>
</div>

</div>

{% endblock content %}
